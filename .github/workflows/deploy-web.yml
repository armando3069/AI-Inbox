name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/deploy-web.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Web Deploy
        run: |
          curl --request GET "${{ secrets.COOLIFY_WEBHOOK_WEB }}" \
            --header "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"